<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email confirmed — Melius</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --gold: #C9A84C;
    --text: #FAFAF8;
    --text-dim: rgba(255,255,255,0.45);
    --border: #1E1E1E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    animation: rise 0.7s ease-out;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin-bottom: 56px;
  }

  .check {
    width: 64px;
    height: 64px;
    margin: 0 auto 32px;
  }

  .check circle {
    stroke: var(--gold);
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 195;
    stroke-dashoffset: 195;
    animation: draw 0.8s ease-out 0.2s forwards;
  }

  .check path {
    stroke: var(--gold);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke-dasharray: 28;
    stroke-dashoffset: 28;
    animation: draw 0.5s ease-out 0.9s forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 32px;
    line-height: 1.25;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-dim);
    margin-bottom: 36px;
  }

  .hint {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }

  .hint .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .check circle, .check path { animation: none; stroke-dashoffset: 0; }
    .card { animation: none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Melius</div>

    <svg class="check" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="29.5" />
      <path d="M20 33 L28 41 L45 23" />
    </svg>

    <h1>Your email is confirmed</h1>
    <p>
      You're all set. Close this tab and return to the Melius app —
      your account is ready to go.
    </p>

    <div class="hint">
      <span class="dot"></span>
      You can close this page now
    </div>
  </div>
</body>
</html>
